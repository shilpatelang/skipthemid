# Pre-Certbot config — HTTP only.
# After deploying, run: sudo certbot --nginx -d skipthemid.com -d www.skipthemid.com
# Certbot will add the SSL (443) block and redirect automatically.

server {
    listen 80;
    server_name skipthemid.com www.skipthemid.com;

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Everything else reverse-proxied to Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny access to dotfiles
    location ~ /\. {
        deny all;
    }
}
